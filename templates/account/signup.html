{% extends 'base.html' %}
{% load socialaccount %}

{% block content %}

<div class="conta-form">

    <h2>Criar conta</h2>

    <!-- ✅ FORM PADRÃO ALLAUTH -->
    <form method="post">
        {% csrf_token %}

        {{ form.non_field_errors }}

        <div class="form-group">
            <label>Email</label>
            {{ form.email }}
        </div>

        <div class="form-group">
            <label>Senha</label>
            {{ form.password1 }}
        </div>

        <div class="form-group">
            <label>Confirmar senha</label>
            {{ form.password2 }}
        </div>

        <button type="submit" class="btn-criar-conta">
            Criar conta
        </button>

    </form>

    <!-- ✅ DIVISOR -->
