{% extends 'base.html' %}
{% load static %}
{% load socialaccount %}

{% block content %}

<div class="conta-form">

    <h2>Iniciar sessão</h2>

    {% if messages %}
        {% for message in messages %}

            <div class="msg-success">
                {{ message }}
            </div>

        {% endfor %}
    {% endif %}

    <form method="post">

        {% csrf_token %}

        <input
            type="hidden"
            name="next"
            value="{{ request.GET.next }}"
        >

        <div class="form-group">

            <label>E-mail</label>

            <input
                type="email"
                name="email"
                required
            >

        </div>

        <div class="form-group">

            <label>Senha</label>

            <input
                type="password"
                name="senha"
                required
            >

        </div>

        <!-- ✅ BOTÃO ENTRAR -->
        <button
            type="submit"
            class="btn-criar-conta">

            ENTRAR

        </button>

    </form>

    <!-- ✅ DIVISOR -->
    <div style="text-align:center; margin: 20px 0;">
        <span>ou</span>
    </div>

    <!-- ✅ LOGIN GOOGLE (CORRIGIDO COM NEXT) -->
    <a href="{% provider_login_url 'google' process='login' next=request.GET.next %}"
       class="btn-google">

        <img src="https://developers.google.com/identity/images/g-logo.png"
            alt="Google"
            style="width:18px; margin-right:8px;">

        Entrar com Google

    </a>

    <!-- ✅ CRIAR CONTA -->
    <div class="login-extra">

        <p>
            Ainda não tem conta?
        </p>

        <a
            href="{% url 'criar_conta' %}?next={% url 'checkout' %}"
            class="link-criar-conta"
        >
            Criar conta
        </a>

    </div>

</div>

{% endblock %}
