<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Fractions Parfums</title>

    <style>

        body {
            margin: 0;
            padding: 0;
            background: #f0f4f8;
            font-family: Arial, Helvetica, sans-serif;
        }

        .admin-container {
            max-width: 480px;
            margin: 70px auto;
            background: #ffffff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .12);
        }

        .logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo h1 {
            margin: 0;
            font-size: 28px;
            color: #222;
        }

        .logo p {
            margin-top: 5px;
            color: #777;
            font-size: 14px;
        }

        h1, h2, h3 {
            color: #222;
            text-align: center;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #444;
        }

        input,
        input[type="text"],
        input[type="password"],
        input[type="number"] {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            border: 1px solid #d7dde5;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 15px;
        }

        button,
        input[type="submit"] {
            width: 100%;
            background: #6f42c1;
            color: #fff;
            border: none;
            padding: 13px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;
        }

        button:hover,
        input[type="submit"]:hover {
            background: #5a32a3;
        }

        a {
            color: #6f42c1;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        ul.errorlist {
            list-style: none;
            padding: 12px;
            border-radius: 8px;
            background: #ffe8e8;
            color: #b10000;
            margin-bottom: 15px;
        }

        .helptext {
            color: #666;
            font-size: 13px;
        }

        img {
            display: block;
            max-width: 240px;
            margin: 20px auto;
        }

        table {
            width: 100%;
        }

        td {
            padding: 6px 0;
        }

        @media (max-width: 600px) {

            .admin-container {
                margin: 20px;
                padding: 25px;
            }

        }

    </style>
</head>
<body>

<div class="admin-container">

    <div class="logo">
        <h1>Fractions Parfums</h1>
        <p>Painel Administrativo Seguro</p>
    </div>

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
