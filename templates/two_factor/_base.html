<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Fractions Parfums</title>

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: #f0f4f8;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .admin-container {
            width: 100%;
            max-width: 520px;
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .12);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            margin: 0;
            color: #222;
            font-size: 36px;
            font-weight: 700;
        }

        .logo p {
            margin-top: 8px;
            color: #777;
            font-size: 15px;
        }

        h1, h2, h3 {
            text-align: center;
            color: #222;
        }

        p {
            color: #444;
        }

        table {
            width: 100%;
        }

        tr {
            display: block;
            margin-bottom: 18px;
        }

        th,
        td {
            display: block;
            width: 100%;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-weight: 600;
        }

        input,
        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="number"] {
            width: 100%;
            padding: 14px;
            border: 1px solid #d6dce5;
            border-radius: 10px;
            font-size: 15px;
            background: #fff;
            transition: .3s;
        }

        input:focus {
            outline: none;
            border-color: #6f42c1;
            box-shadow: 0 0 0 3px rgba(111,66,193,.15);
        }

        .submit-row,
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        a.btn,
        a,
        button,
        input[type="submit"] {

            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: .25s;
            text-decoration: none;
        }

        .btn-cancel,
        a[href] {
            color: #6f42c1;
        }

        button[name="wizard_goto_step"],
        button.btn-secondary {
            flex: 1;
            background: #6c757d;
            color: #fff;
            padding: 14px;
        }

        button[name="wizard_goto_step"]:hover,
        button.btn-secondary:hover {
            background: #5b636a;
            transform: translateY(-1px);
        }

        button[type="submit"],
        input[type="submit"] {
            flex: 2;
            background: #6f42c1;
            color: #fff;
            padding: 14px;
            box-shadow: 0 5px 15px rgba(111,66,193,.25);
        }

        button[type="submit"]:hover,
        input[type="submit"]:hover {
            background: #5b2fb0;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(111,66,193,.35);
        }

        .float-right {
            display: inline-block;
            margin-bottom: 15px;
            font-weight: 600;
        }

        ul.errorlist {
            list-style: none;
            padding: 14px;
            margin-bottom: 20px;
            border-radius: 10px;
            background: #ffe7e7;
            color: #b10000;
        }

        .helptext {
            font-size: 13px;
            color: #666;
        }

        img {
            display: block;
            max-width: 240px;
            margin: 25px auto;
        }

        .alert,
        .messages {
            padding: 14px;
            border-radius: 10px;
            background: #eef2ff;
            border-left: 4px solid #6f42c1;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {

            body {
                padding: 20px;
            }

            .admin-container {
                padding: 25px;
            }

            .submit-row,
            .form-actions {
                flex-direction: column;
            }

            button,
            input[type="submit"] {
                width: 100%;
            }
        }

    </style>
</head>
<body>

<div class="admin-container">

    <div class="logo">
        <h1>Fractions Parfums</h1>
        <p>Painel Administrativo Seguro</p>
    </div>

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
