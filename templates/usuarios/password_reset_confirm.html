{% extends 'base.html' %}

{% block content %}

<div class="conta-form">

    <h2>Nova senha</h2>

    <form method="post">

        {% csrf_token %}

        <div class="form-group">

            <label>Nova senha</label>

            {{ form.new_password1 }}

        </div>

        <div class="form-group">

            <label>Confirmar nova senha</label>

            {{ form.new_password2 }}

        </div>

        <button
            type="submit"
            class="btn-criar-conta"
        >
            ALTERAR SENHA
        </button>

    </form>

</div>

{% endblock %}
