{% extends 'base.html' %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'css/minha_conta.css' %}">

<div class="minha-conta-page">

    <div class="conta-topo">

        <p class="breadcrumb">
            Início > Minha Conta > Editar Dados
        </p>

        <h1>
            Meus dados
        </h1>

    </div>

    <!-- ✅ MENSAGENS -->
    {% if messages %}
        <div style="margin-bottom:15px;">
            {% for message in messages %}
                <div style="
                    padding:10px;
                    border-radius:5px;
                    margin-bottom:5px;
                    background-color: {% if 'success' in message.tags %}#d4edda{% else %}#f8d7da{% endif %};
                    color: {% if 'success' in message.tags %}#155724{% else %}#721c24{% endif %};
                    font-size: 14px;
                ">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <form method="post" class="form-conta">

        {% csrf_token %}

        <!-- ✅ NOME -->
        <div class="form-group">

            <label>Nome</label>

            <input
                type="text"
                name="first_name"
                value="{{ user.first_name }}"
            >

        </div>

        <!-- ✅ SOBRENOME -->
        <div class="form-group">

            <label>Sobrenome</label>

            <input
                type="text"
                name="last_name"
                value="{{ user.last_name }}"
            >

        </div>

        <!-- ✅ TELEFONE -->
        <div class="form-group">

            <label>Telefone</label>

            <input
                type="text"
                name="telefone"
                value="{{ user.perfil.telefone|default:'' }}"
            >

        </div>

        <!-- ✅ CPF -->
        <div class="form-group">

            <label>CPF</label>

            <input
                type="text"
                name="cpf"
                id="cpf"
                value="{{ user.perfil.cpf }}"
                placeholder="000.000.000-00"
                readonly
                style="background:#f5f5f5;cursor:not-allowed;"
            >

        </div>

        <!-- ✅ BOTÃO -->
        <button type="submit" class="btn-salvar-conta">
            Salvar alterações
        </button>

    </form>

</div>

<!-- ✅ SCRIPT MÁSCARA CPF (OPCIONAL, MAS RECOMENDADO) -->
<script>
document.getElementById('cpf')?.addEventListener('input', function(e) {
    let v = e.target.value.replace(/\D/g, '');

    v = v.replace(/(\d{3})(\d)/, '$1.$2');
    v = v.replace(/(\d{3})(\d)/, '$1.$2');
    v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');

    e.target.value = v;
});
</script>

{% endblock %}
