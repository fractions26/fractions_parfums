{% extends 'base.html' %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'css/minha_conta.css' %}">

<div class="minha-conta-page">

    <div class="conta-topo">

        <p class="breadcrumb">
            Início > Minha Conta > Editar Dados
        </p>

        <h1>
            Meus dados
        </h1>

    </div>

    <form method="post" class="form-conta">

        {% csrf_token %}

        <!-- ✅ NOME -->
        <div class="form-group">

            <label>
                Nome
            </label>

            <input
                type="text"
                name="first_name"
                value="{{ user.first_name }}"
            >

        </div>

        <!-- ✅ SOBRENOME -->
        <div class="form-group">

            <label>
                Sobrenome
            </label>

            <input
                type="text"
                name="last_name"
                value="{{ user.last_name }}"
            >

        </div>

        <!-- ✅ TELEFONE -->
        <div class="form-group">

            <label>
                Telefone
            </label>

            <input
                type="text"
                name="telefone"
                value="{{ user.perfil.telefone|default:'' }}"
            >

        </div>

        <!-- ✅ CPF -->
        <div class="form-group">

            <label>
                CPF
            </label>

            <input
                type="text"
                name="cpf"
                value="{{ user.perfil.cpf|default:'' }}"
            >

        </div>

        <!-- ✅ BOTÃO -->
        <button type="submit" class="btn-salvar-conta">
            Salvar alterações
        </button>

    </form>

</div>

{% endblock %}
