{% extends 'base.html' %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'css/minha_conta.css' %}">

<div class="minha-conta-page">

    <div class="conta-topo">

        <p class="breadcrumb">
            Início > Minha Conta > Editar Endereço
        </p>

        <h1>
            Endereço
        </h1>

    </div>

    <form method="post" class="form-conta">

        {% csrf_token %}

        <input
            type="text"
            name="alias"
            placeholder="Nome (alias)"
            value="{{ user.perfil.alias|default:'' }}"
        >

        <input
            type="text"
            name="endereco"
            placeholder="Endereço"
            value="{{ user.perfil.endereco|default:'' }}"
        >

        <input
            type="text"
            name="numero"
            placeholder="Número"
            value="{{ user.perfil.numero|default:'' }}"
        >

        <input
            type="text"
            name="complemento"
            placeholder="Complemento"
            value="{{ user.perfil.complemento|default:'' }}"
        >

        <input
            type="text"
            name="bairro"
            placeholder="Bairro"
            value="{{ user.perfil.bairro|default:'' }}"
        >

        <input
            type="text"
            name="cep"
            placeholder="CEP"
            value="{{ user.perfil.cep|default:'' }}"
        >

        <input
            type="text"
            name="cidade"
            placeholder="Cidade"
            value="{{ user.perfil.cidade|default:'' }}"
        >

        <select name="estado" class="select-conta">

            <option value="">Estado</option>

            <option value="AC" {% if user.perfil.estado == 'AC' %}selected{% endif %}>Acre</option>
            <option value="AL" {% if user.perfil.estado == 'AL' %}selected{% endif %}>Alagoas</option>
            <option value="AP" {% if user.perfil.estado == 'AP' %}selected{% endif %}>Amapá</option>
            <option value="AM" {% if user.perfil.estado == 'AM' %}selected{% endif %}>Amazonas</option>
            <option value="BA" {% if user.perfil.estado == 'BA' %}selected{% endif %}>Bahia</option>
            <option value="CE" {% if user.perfil.estado == 'CE' %}selected{% endif %}>Ceará</option>
            <option value="DF" {% if user.perfil.estado == 'DF' %}selected{% endif %}>Distrito Federal</option>
            <option value="ES" {% if user.perfil.estado == 'ES' %}selected{% endif %}>Espírito Santo</option>
            <option value="GO" {% if user.perfil.estado == 'GO' %}selected{% endif %}>Goiás</option>
            <option value="MA" {% if user.perfil.estado == 'MA' %}selected{% endif %}>Maranhão</option>
            <option value="MT" {% if user.perfil.estado == 'MT' %}selected{% endif %}>Mato Grosso</option>
            <option value="MS" {% if user.perfil.estado == 'MS' %}selected{% endif %}>Mato Grosso do Sul</option>
            <option value="MG" {% if user.perfil.estado == 'MG' %}selected{% endif %}>Minas Gerais</option>
            <option value="PA" {% if user.perfil.estado == 'PA' %}selected{% endif %}>Pará</option>
            <option value="PB" {% if user.perfil.estado == 'PB' %}selected{% endif %}>Paraíba</option>
            <option value="PR" {% if user.perfil.estado == 'PR' %}selected{% endif %}>Paraná</option>
            <option value="PE" {% if user.perfil.estado == 'PE' %}selected{% endif %}>Pernambuco</option>
            <option value="PI" {% if user.perfil.estado == 'PI' %}selected{% endif %}>Piauí</option>
            <option value="RJ" {% if user.perfil.estado == 'RJ' %}selected{% endif %}>Rio de Janeiro</option>
            <option value="RN" {% if user.perfil.estado == 'RN' %}selected{% endif %}>Rio Grande do Norte</option>
            <option value="RS" {% if user.perfil.estado == 'RS' %}selected{% endif %}>Rio Grande do Sul</option>
            <option value="RO" {% if user.perfil.estado == 'RO' %}selected{% endif %}>Rondônia</option>
            <option value="RR" {% if user.perfil.estado == 'RR' %}selected{% endif %}>Roraima</option>
            <option value="SC" {% if user.perfil.estado == 'SC' %}selected{% endif %}>Santa Catarina</option>
            <option value="SP" {% if user.perfil.estado == 'SP' %}selected{% endif %}>São Paulo</option>
            <option value="SE" {% if user.perfil.estado == 'SE' %}selected{% endif %}>Sergipe</option>
            <option value="TO" {% if user.perfil.estado == 'TO' %}selected{% endif %}>Tocantins</option>

        </select>

        <select name="pais" class="select-conta">

            <option value="Brasil" selected>
                Brasil
            </option>

        </select>

        <input
            type="text"
            name="telefone"
            placeholder="Telefone"
            value="{{ user.perfil.telefone|default:'' }}"
        >

        <button type="submit" class="btn-salvar-conta">
            Salvar endereço
        </button>

    </form>

</div>

{% endblock %}
