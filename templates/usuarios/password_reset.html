{% extends 'base.html' %}

{% block content %}

<div class="conta-form">

    <h2>Recuperar senha</h2>

    <p
        style="
            text-align:center;
            margin-bottom:20px;
            color:#666;
        "
    >
        Informe o e-mail cadastrado e enviaremos
        um link para redefinir sua senha.
    </p>

    <form method="post">

        {% csrf_token %}

        <div class="form-group">

            <label>E-mail</label>

            <input
                type="email"
                name="email"
                required
                placeholder="Digite seu e-mail"
            >

        </div>

        <button
            type="submit"
            class="btn-criar-conta"
        >
            ENVIAR LINK
        </button>

    </form>

</div>

{% endblock %}
